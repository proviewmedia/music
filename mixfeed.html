<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixFeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0C;
    --surface: #131316;
    --surface-hover: #1A1A1F;
    --surface-active: #222228;
    --border: #2A2A32;
    --text: #E8E6E3;
    --text-dim: #8A8894;
    --text-muted: #5A5868;
    --accent: #FF6B35;
    --accent-glow: rgba(255, 107, 53, 0.15);
    --green: #3DDC84;
    --red: #FF4D6A;
    --blue: #4DA8FF;
    --youtube: #FF0033;
    --soundcloud: #FF5500;
    --jamendo: #2BC5B4;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AMBIENT BG ── */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .ambient::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    top: -200px;
    right: -200px;
    background: radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%);
    animation: ambientDrift 20s ease-in-out infinite;
  }
  .ambient::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    bottom: -100px;
    left: -150px;
    background: radial-gradient(circle, rgba(77,168,255,0.04) 0%, transparent 70%);
    animation: ambientDrift 25s ease-in-out infinite reverse;
  }
  @keyframes ambientDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ── LAYOUT ── */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-bottom: 140px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10,10,12,0.8);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #FF8F65);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 8px;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
  }
  .icon-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--text-muted);
  }

  /* ── SEARCH ── */
  .search-container {
    padding: 16px 24px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    transition: all 0.3s;
  }
  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 400;
  }
  .search-bar input::placeholder { color: var(--text-muted); }

  /* ── SOURCE TABS ── */
  .source-tabs {
    display: flex;
    gap: 8px;
    padding: 4px 24px 16px;
    overflow-x: auto;
  }
  .source-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .source-tab:hover { background: var(--surface-hover); color: var(--text); }
  .source-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .source-tab .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dot-yt { background: var(--youtube); }
  .dot-sc { background: var(--soundcloud); }
  .dot-jm { background: var(--jamendo); }
  .dot-all { background: linear-gradient(135deg, var(--youtube), var(--soundcloud), var(--jamendo)); }

  /* ── SECTION ── */
  .section {
    padding: 8px 24px 24px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }
  .section-action {
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
  }

  /* ── TRACK LIST ── */
  .track-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .track-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .track-item:hover { background: var(--surface-hover); }
  .track-item.playing {
    background: var(--surface-active);
  }
  .track-item.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60%;
    background: var(--accent);
    border-radius: 3px;
  }

  .track-art {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    background: var(--surface-active);
  }
  .track-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .track-art .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 20px;
  }
  .track-item:hover .play-overlay,
  .track-item.playing .play-overlay { opacity: 1; }
  .track-item.playing .play-overlay { background: rgba(0,0,0,0.6); }

  .track-info {
    flex: 1;
    min-width: 0;
  }
  .track-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .track-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .track-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .source-youtube { background: rgba(255,0,51,0.12); color: var(--youtube); }
  .source-soundcloud { background: rgba(255,85,0,0.12); color: var(--soundcloud); }
  .source-jamendo { background: rgba(43,197,180,0.12); color: var(--jamendo); }

  .track-duration {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .track-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .track-item:hover .track-actions { opacity: 1; }
  .track-action-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .track-action-btn:hover { background: var(--surface); color: var(--text); }
  .track-action-btn.liked { color: var(--red); }

  /* ── FEATURED CARDS ── */
  .featured-scroll {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
  }
  .featured-scroll::-webkit-scrollbar { height: 0; }
  .featured-card {
    min-width: 260px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    scroll-snap-align: start;
    transition: transform 0.3s;
    border: 1px solid var(--border);
  }
  .featured-card:hover { transform: translateY(-2px); }
  .featured-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }
  .featured-card .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px;
  }
  .card-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── PLAYER BAR ── */
  .player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: rgba(19,19,22,0.95);
    backdrop-filter: blur(30px);
    border-top: 1px solid var(--border);
    padding: 0 24px;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .player-bar.hidden { transform: translateY(100%); }

  .player-progress {
    position: absolute;
    top: -2px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--surface-active);
    cursor: pointer;
  }
  .player-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s linear;
    position: relative;
  }
  .player-progress-fill::after {
    content: '';
    position: absolute;
    right: -4px;
    top: -3px;
    width: 9px;
    height: 9px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .player-progress:hover .player-progress-fill::after { opacity: 1; }

  .player-content {
    display: flex;
    align-items: center;
    gap: 16px;
    height: 72px;
  }

  .player-track-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }
  .player-art {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface-active);
  }
  .player-art img { width: 100%; height: 100%; object-fit: cover; }
  .player-text { min-width: 0; }
  .player-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-artist {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
    width: 40px;
    height: 40px;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.play-btn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 22px;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ctrl-btn.play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(255,107,53,0.3);
    color: #fff;
  }

  .player-volume {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .volume-slider {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: var(--surface-active);
    appearance: none;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  .player-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 90px;
    text-align: center;
  }

  /* ── YOUTUBE EMBED (hidden player) ── */
  #yt-player-container {
    position: fixed;
    bottom: 80px;
    right: 24px;
    width: 320px;
    height: 180px;
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 150;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: none;
  }
  #yt-player-container.visible { display: block; }
  #yt-player-container.minimized {
    width: 200px;
    height: 112px;
    bottom: 80px;
    right: 16px;
  }
  .yt-close {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 10;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* ── EQUALIZER ANIMATION ── */
  .eq-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }
  .eq-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 1px;
    animation: eqBounce 0.8s ease-in-out infinite alternate;
  }
  .eq-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
  .eq-bar:nth-child(3) { height: 6px; animation-delay: 0.4s; }
  .eq-bar:nth-child(4) { height: 12px; animation-delay: 0.1s; }
  @keyframes eqBounce {
    0% { transform: scaleY(0.3); }
    100% { transform: scaleY(1); }
  }

  /* ── LOADING SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-sm);
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .player-volume { display: none; }
    .player-time { display: none; }
    .track-actions { display: none; }
    #yt-player-container { width: 240px; height: 135px; right: 12px; bottom: 80px; }
  }

  /* ── FADE IN ANIMATION ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.1s; }
  .fade-in:nth-child(3) { animation-delay: 0.15s; }
  .fade-in:nth-child(4) { animation-delay: 0.2s; }
  .fade-in:nth-child(5) { animation-delay: 0.25s; }
  .fade-in:nth-child(6) { animation-delay: 0.3s; }
  .fade-in:nth-child(7) { animation-delay: 0.35s; }
  .fade-in:nth-child(8) { animation-delay: 0.4s; }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="app" id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">Mix<span>Feed</span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="showQueue()" title="Queue">☰</button>
      <button class="icon-btn" onclick="showLiked()" title="Liked">♥</button>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-container">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search across all sources..." autocomplete="off">
    </div>
  </div>

  <!-- SOURCE TABS -->
  <div class="source-tabs">
    <button class="source-tab active" data-source="all" onclick="setSource('all')">
      <span class="dot dot-all"></span>All Sources
    </button>
    <button class="source-tab" data-source="youtube" onclick="setSource('youtube')">
      <span class="dot dot-yt"></span>YouTube
    </button>
    <button class="source-tab" data-source="soundcloud" onclick="setSource('soundcloud')">
      <span class="dot dot-sc"></span>SoundCloud
    </button>
    <button class="source-tab" data-source="jamendo" onclick="setSource('jamendo')">
      <span class="dot dot-jm"></span>Jamendo
    </button>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <!-- Featured -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Featured Mixes</div>
        <button class="section-action">See All</button>
      </div>
      <div class="featured-scroll" id="featuredScroll"></div>
    </div>

    <!-- Track List -->
    <div class="section">
      <div class="section-header">
        <div class="section-title" id="trackListTitle">Trending Now</div>
        <button class="section-action" onclick="shuffleTracks()">Shuffle</button>
      </div>
      <div class="track-list" id="trackList"></div>
    </div>
  </div>
</div>

<!-- PLAYER BAR -->
<div class="player-bar hidden" id="playerBar">
  <div class="player-progress" id="progressBar" onclick="seekTo(event)">
    <div class="player-progress-fill" id="progressFill"></div>
  </div>
  <div class="player-content">
    <div class="player-track-info">
      <div class="player-art" id="playerArt">
        <img src="" alt="" id="playerArtImg">
      </div>
      <div class="player-text">
        <div class="player-title" id="playerTitle">Not Playing</div>
        <div class="player-artist" id="playerArtist">Select a track</div>
      </div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>
    <div class="player-time" id="playerTime">0:00 / 0:00</div>
    <div class="player-volume">
      <span style="color:var(--text-muted);font-size:16px;">🔊</span>
      <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- YOUTUBE PLAYER -->
<div id="yt-player-container">
  <button class="yt-close" onclick="toggleYTVisibility()">✕</button>
  <div id="yt-player"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- JAMENDO & SOUNDCLOUD AUDIO -->
<audio id="audioPlayer" crossorigin="anonymous"></audio>

<script>
  // ═══════════════════════════════════════════
  // MIXFEED - Multi-Source Music Aggregator
  // ═══════════════════════════════════════════

  // ── STATE ──
  let currentSource = 'all';
  let currentTrack = null;
  let isPlaying = false;
  let queue = [];
  let liked = new Set();
  let ytPlayer = null;
  let progressInterval = null;

  // ── SAMPLE DATA (simulates API results) ──
  const sampleTracks = [
    { id: 'yt1', title: 'Lofi Hip Hop Radio - Beats to Relax', artist: 'ChilledCow', source: 'youtube', ytId: 'jfKfPfyJRdk', duration: '∞', art: 'https://picsum.photos/seed/lofi/200' },
    { id: 'yt2', title: 'Synthwave Retrowave Mix', artist: 'NewRetroWave', source: 'youtube', ytId: '4xDzrJKXOOY', duration: '1:02:14', art: 'https://picsum.photos/seed/synth/200' },
    { id: 'yt3', title: 'Jazz Vibes for Late Nights', artist: 'Cafe Music BGM', source: 'youtube', ytId: 'DSGyEsJ17cI', duration: '3:24:01', art: 'https://picsum.photos/seed/jazz/200' },
    { id: 'sc1', title: 'Electric Dreams', artist: 'Soular Order', source: 'soundcloud', scUrl: 'https://soundcloud.com/soularorder', duration: '4:32', art: 'https://picsum.photos/seed/electric/200' },
    { id: 'sc2', title: 'Midnight Run (feat. Karra)', artist: 'ARMNHMR', source: 'soundcloud', scUrl: 'https://soundcloud.com/armnhmr', duration: '3:48', art: 'https://picsum.photos/seed/midnight/200' },
    { id: 'sc3', title: 'Dissolve', artist: 'Absofacto', source: 'soundcloud', scUrl: 'https://soundcloud.com/absofacto', duration: '3:15', art: 'https://picsum.photos/seed/dissolve/200' },
    { id: 'jm1', title: 'City Lights', artist: 'Josh Woodward', source: 'jamendo', jmId: '1234', duration: '4:05', art: 'https://picsum.photos/seed/city/200' },
    { id: 'jm2', title: 'Quiet Storm', artist: 'Rolemusic', source: 'jamendo', jmId: '5678', duration: '5:12', art: 'https://picsum.photos/seed/storm/200' },
    { id: 'jm3', title: 'Solar Flare', artist: 'Broke for Free', source: 'jamendo', jmId: '9012', duration: '3:44', art: 'https://picsum.photos/seed/solar/200' },
    { id: 'yt4', title: 'Deep House Mix 2026', artist: 'Selected.', source: 'youtube', ytId: '36YnV9STBqc', duration: '58:32', art: 'https://picsum.photos/seed/deep/200' },
    { id: 'jm4', title: 'Amber Waves', artist: 'Ketsa', source: 'jamendo', jmId: '3456', duration: '4:28', art: 'https://picsum.photos/seed/amber/200' },
    { id: 'sc4', title: 'Cloud Nine', artist: 'Slushii', source: 'soundcloud', scUrl: 'https://soundcloud.com/slushiimusic', duration: '3:21', art: 'https://picsum.photos/seed/cloud9/200' },
  ];

  const featuredData = [
    { title: 'Late Night Drive', sub: 'Synthwave & Retrowave', tag: 'Playlist', img: 'https://picsum.photos/seed/drive/400/200' },
    { title: 'Focus Flow', sub: 'Ambient & Lofi', tag: 'Curated', img: 'https://picsum.photos/seed/focus/400/200' },
    { title: 'Desert Frequencies', sub: 'Electronic & Chillout', tag: 'New', img: 'https://picsum.photos/seed/desert/400/200' },
    { title: 'Golden Hour', sub: 'Indie & Soul', tag: 'Trending', img: 'https://picsum.photos/seed/golden/400/200' },
  ];

  // ── RENDER ──
  function renderFeatured() {
    const el = document.getElementById('featuredScroll');
    el.innerHTML = featuredData.map((f, i) => `
      <div class="featured-card fade-in" style="animation-delay:${i * 0.1}s">
        <img src="${f.img}" alt="${f.title}">
        <div class="card-overlay">
          <div class="card-tag">${f.tag}</div>
          <div class="card-title">${f.title}</div>
          <div class="card-sub">${f.sub}</div>
        </div>
      </div>
    `).join('');
  }

  function renderTracks(tracks) {
    const el = document.getElementById('trackList');
    if (!tracks.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎵</div><p>No tracks found.<br>Try a different search or source.</p></div>`;
      return;
    }
    el.innerHTML = tracks.map((t, i) => `
      <div class="track-item fade-in ${currentTrack?.id === t.id ? 'playing' : ''}" onclick="playTrack('${t.id}')" style="animation-delay:${i * 0.05}s">
        <div class="track-art">
          <img src="${t.art}" alt="${t.title}">
          <div class="play-overlay">
            ${currentTrack?.id === t.id && isPlaying ? '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>' : '▶'}
          </div>
        </div>
        <div class="track-info">
          <div class="track-name">${t.title}</div>
          <div class="track-meta">
            <span class="track-source source-${t.source}">${t.source === 'youtube' ? '▶ YT' : t.source === 'soundcloud' ? '☁ SC' : '♫ JM'}</span>
            <span>${t.artist}</span>
          </div>
        </div>
        <div class="track-duration">${t.duration}</div>
        <div class="track-actions">
          <button class="track-action-btn ${liked.has(t.id) ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${t.id}')">♥</button>
          <button class="track-action-btn" onclick="event.stopPropagation(); addToQueue('${t.id}')">+</button>
        </div>
      </div>
    `).join('');
  }

  function getFilteredTracks() {
    if (currentSource === 'all') return sampleTracks;
    return sampleTracks.filter(t => t.source === currentSource);
  }

  // ── SOURCE TABS ──
  function setSource(source) {
    currentSource = source;
    document.querySelectorAll('.source-tab').forEach(t => t.classList.toggle('active', t.dataset.source === source));
    document.getElementById('trackListTitle').textContent =
      source === 'all' ? 'Trending Now' :
      source === 'youtube' ? 'YouTube Streams' :
      source === 'soundcloud' ? 'SoundCloud Picks' : 'Jamendo Discoveries';
    renderTracks(getFilteredTracks());
  }

  // ── SEARCH ──
  document.getElementById('searchInput').addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase().trim();
    if (!q) {
      renderTracks(getFilteredTracks());
      document.getElementById('trackListTitle').textContent = 'Trending Now';
      return;
    }
    document.getElementById('trackListTitle').textContent = `Results for "${e.target.value}"`;
    const filtered = getFilteredTracks().filter(t =>
      t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q)
    );
    renderTracks(filtered);
  });

  // ── PLAYBACK ──
  function playTrack(id) {
    const track = sampleTracks.find(t => t.id === id);
    if (!track) return;

    currentTrack = track;
    isPlaying = true;

    // Update UI
    document.getElementById('playerBar').classList.remove('hidden');
    document.getElementById('playerArtImg').src = track.art;
    document.getElementById('playerTitle').textContent = track.title;
    document.getElementById('playerArtist').textContent = track.artist;
    document.getElementById('playPauseBtn').textContent = '⏸';
    renderTracks(getFilteredTracks());

    // Handle source
    if (track.source === 'youtube') {
      document.getElementById('audioPlayer').pause();
      if (ytPlayer && ytPlayer.loadVideoById) {
        ytPlayer.loadVideoById(track.ytId);
        document.getElementById('yt-player-container').classList.add('visible');
      } else {
        showToast('YouTube player loading...');
        loadYTPlayer(track.ytId);
      }
    } else {
      // Stop YT
      if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
      document.getElementById('yt-player-container').classList.remove('visible');

      // For demo purposes, show a toast since we'd need API keys
      showToast(`Now playing: ${track.title} (${track.source})`);
      simulateProgress();
    }
  }

  function togglePlay() {
    if (!currentTrack) return;
    isPlaying = !isPlaying;
    document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸' : '▶';

    if (currentTrack.source === 'youtube' && ytPlayer) {
      isPlaying ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
    } else {
      const audio = document.getElementById('audioPlayer');
      isPlaying ? audio.play().catch(() => {}) : audio.pause();
    }
    renderTracks(getFilteredTracks());
  }

  function nextTrack() {
    const tracks = getFilteredTracks();
    const idx = tracks.findIndex(t => t.id === currentTrack?.id);
    const next = tracks[(idx + 1) % tracks.length];
    playTrack(next.id);
  }

  function prevTrack() {
    const tracks = getFilteredTracks();
    const idx = tracks.findIndex(t => t.id === currentTrack?.id);
    const prev = tracks[(idx - 1 + tracks.length) % tracks.length];
    playTrack(prev.id);
  }

  function shuffleTracks() {
    const tracks = getFilteredTracks();
    const shuffled = [...tracks].sort(() => Math.random() - 0.5);
    renderTracks(shuffled);
    showToast('Shuffled!');
  }

  // ── PROGRESS SIMULATION ──
  let fakeProgress = 0;
  function simulateProgress() {
    clearInterval(progressInterval);
    fakeProgress = 0;
    progressInterval = setInterval(() => {
      fakeProgress += 0.3;
      if (fakeProgress > 100) fakeProgress = 0;
      document.getElementById('progressFill').style.width = fakeProgress + '%';
      const elapsed = Math.floor(fakeProgress * 2.4);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('playerTime').textContent = `${mins}:${secs.toString().padStart(2,'0')} / 4:00`;
    }, 1000);
  }

  function seekTo(e) {
    const rect = e.target.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    fakeProgress = pct;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function setVolume(val) {
    document.getElementById('audioPlayer').volume = val / 100;
    if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(val);
  }

  // ── LIKES & QUEUE ──
  function toggleLike(id) {
    if (liked.has(id)) {
      liked.delete(id);
      showToast('Removed from liked');
    } else {
      liked.add(id);
      showToast('Added to liked ♥');
    }
    renderTracks(getFilteredTracks());
  }

  function addToQueue(id) {
    const track = sampleTracks.find(t => t.id === id);
    if (track) {
      queue.push(track);
      showToast(`Added "${track.title}" to queue`);
    }
  }

  function showQueue() {
    if (queue.length === 0) {
      showToast('Queue is empty');
      return;
    }
    renderTracks(queue);
    document.getElementById('trackListTitle').textContent = `Queue (${queue.length} tracks)`;
  }

  function showLiked() {
    const likedTracks = sampleTracks.filter(t => liked.has(t.id));
    if (likedTracks.length === 0) {
      showToast('No liked tracks yet');
      return;
    }
    renderTracks(likedTracks);
    document.getElementById('trackListTitle').textContent = `Liked (${likedTracks.length} tracks)`;
  }

  // ── YOUTUBE IFRAME API ──
  function loadYTAPI() {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }

  window.onYouTubeIframeAPIReady = function() {
    // Ready to create players on demand
  };

  function loadYTPlayer(videoId) {
    document.getElementById('yt-player-container').classList.add('visible');
    if (ytPlayer) {
      ytPlayer.loadVideoById(videoId);
      return;
    }
    ytPlayer = new YT.Player('yt-player', {
      width: '100%',
      height: '100%',
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        controls: 0,
        modestbranding: 1,
        rel: 0,
        showinfo: 0,
      },
      events: {
        onStateChange: onYTStateChange
      }
    });
  }

  function onYTStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      isPlaying = true;
      document.getElementById('playPauseBtn').textContent = '⏸';
      startYTProgress();
    } else if (e.data === YT.PlayerState.PAUSED) {
      isPlaying = false;
      document.getElementById('playPauseBtn').textContent = '▶';
    } else if (e.data === YT.PlayerState.ENDED) {
      nextTrack();
    }
  }

  function startYTProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (ytPlayer && ytPlayer.getCurrentTime && ytPlayer.getDuration) {
        const current = ytPlayer.getCurrentTime();
        const total = ytPlayer.getDuration();
        const pct = (current / total) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('playerTime').textContent = `${formatTime(current)} / ${formatTime(total)}`;
      }
    }, 500);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function toggleYTVisibility() {
    document.getElementById('yt-player-container').classList.remove('visible');
    if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
  }

  // ── TOAST ──
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── INIT ──
  loadYTAPI();
  renderFeatured();
  renderTracks(sampleTracks);
</script>
</body>
</html>
